microservice-chart:
  image:
    repository: ghcr.io/pagopa/idpay-merchant
    tag: v2.9.2@sha256:a4ba6707dcc856bc840ef57c1b9249e3c5849c80b0968017b135c36c06f1beb1
    pullPolicy: Always

  ingress:
    host: idpay.itn.internal.cstar.pagopa.it

  resources:
    requests:
      memory: "1Gi"
      cpu: "200m"
    limits:
      memory: "1.5Gi"
      cpu: "600m"

  deployment:
    replicas: 3 # This value must be set equal to autoscaling.minReplica

  autoscaling:
    enable: true
    minReplica: 3
    maxReplica: 6
    pollingInterval: 30 # seconds
    cooldownPeriod: 300 # seconds
    triggers:
      - type: cpu
        metadata:
          type: Utilization # Allowed types are 'Utilization' or 'AverageValue'
          value: "60"
      - type: memory
        metadata:
          type: Utilization
          value: "90"

  envConfig:
    KEYCLOAK_ADMIN_REDIRECT_URI: "https://bonuselettrodomestici.it/esercente"
    MERCHANT_DEFAULT_INITIATIVES: "68dd003ccce8c534d1da22bc"
    PDND_BASE_URL: "https://auth.interop.pagopa.it"
    PDND_INFOCAMERE_URL: "https://pdnd.registroimprese.it/rest/pcad/v1"
    JAVA_TOOL_OPTIONS: >-
      -XX:InitialRAMPercentage=40.0
      -XX:MaxRAMPercentage=85.0
      -XX:+UseG1GC
      -XX:+UseContainerSupport
      -Djava.security.egd=file:/dev/./urandom
      -javaagent:/app/applicationinsights-agent.jar
      -Dapplicationinsights.configuration.file=/mnt/file-config-external/appinsights-config/applicationinsights.json

  envSecret:
    APPLICATIONINSIGHTS_CONNECTION_STRING: appinsights-instrumentation-key
    PDND_INVITALIA_INFOCAMERE_PRIVATE_KEY: pagopa-pdnd-infocamere-pvt-key
    PDND_INVITALIA_INFOCAMERE_CLIENT_ID: pagopa-pdnd-infocamere-client-id
    PDND_INVITALIA_INFOCAMERE_KID: pagopa-pdnd-infocamere-kid
    PDND_INVITALIA_INFOCAMERE_AUDIENCE: pagopa-pdnd-infocamere-audience
    PDND_INVITALIA_INFOCAMERE_PURPOSE_ID: pagopa-pdnd-infocamere-purpose-id
  keyvault:
    name: "cstar-p-itn-idpay-kv"
    tenantId: "7788edaf-0346-4068-9d79-c868aed15b3d"


  postman-test:
    run: true
    repoName: idpay-merchant
    dir: postman
    collectionName: "idpay-merchant-e2e.postman_collection.json"
    envVariablesFile: "idpay.postman_environment.json"
