microservice-chart:
  image:
    repository: ghcr.io/pagopa/idpay-recovery-error-topic
    tag: v1.3.1@sha256:38cffdbc7a99b6e2b22de99066eaddaca49d057def42f2778442346603c57392
    pullPolicy: Always

  resources:
    requests:
      memory: "1Gi"
      cpu: "150m"
    limits:
      memory: "1Gi"
      cpu: "600m"

  deployment:
    replicas: 3

  autoscaling:
    enable: false

  envSecret:
    APPLICATIONINSIGHTS_CONNECTION_STRING: appinsights-instrumentation-key

  keyvault:
    name: "cstar-p-itn-idpay-kv"
    tenantId: "7788edaf-0346-4068-9d79-c868aed15b3d"

  # nodeSelector: {}

  # tolerations: []

  # affinity: {}

  envConfig:
    JAVA_TOOL_OPTIONS: >-
      -XX:InitialRAMPercentage=40.0
      -XX:MaxRAMPercentage=85.0
      -XX:+UseG1GC
      -XX:+UseContainerSupport
      -Djava.security.egd=file:/dev/./urandom
      -javaagent:/app/applicationinsights-agent.jar
      -Dapplicationinsights.configuration.file=/mnt/file-config-external/appinsights-config/applicationinsights.json
    ERROR_MESSAGE_MAX_RETRY: "1000"
    ERROR_LISTENER_PAUSE_SECONDS: "600"
