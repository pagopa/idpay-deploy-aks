microservice-chart:
  image:
    repository: ghcr.io/pagopa/idpay-timeline
    tag: snapshot-uat
    pullPolicy: Always

  ingress:
    host: idpay.itn.internal.uat.cstar.pagopa.it

  resources:
    requests:
      memory: "150Mi"
      cpu: "200m"
    limits:
      memory: "200Mi"
      cpu: "400m"

  deployment:
    replicas: 1 # This value must be set equal to autoscaling.minReplica

  autoscaling:
    enable: false
    minReplica: 1
    maxReplica: 3
    pollingInterval: 30 # seconds
    cooldownPeriod: 300 # seconds
    triggers:
      - type: cpu
        metadata:
          type: Utilization
          value: "70"
      - type: memory
        metadata:
          type: Utilization
          value: "90"

  envSecret:
    APPLICATIONINSIGHTS_CONNECTION_STRING: appinsights-instrumentation-key

  keyvault:
    name: "cstar-u-itn-idpay-kv"
    tenantId: "7788edaf-0346-4068-9d79-c868aed15b3d"

  postman-test:
    run: true
    repoName: idpay-timeline
    dir: postman
    collectionName: "idpay-timeline-e2e.postman_collection.json"
    envVariablesFile: "idpay_uat.postman_environment.json"
